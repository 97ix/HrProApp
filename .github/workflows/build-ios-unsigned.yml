name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # يتيح لك تشغيل هذا الإجراء يدوياً من واجهة GitHub

jobs:
  build:
    runs-on: macos-15 # استخدام أحدث نظام ماك لتوفير Xcode 16 المطلوب من React Native
    env:
      CI: false # حل مشكلة توقف البناء في حال وجود تحذيرات

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # تأكد من استخدام إصدار Node مناسب

      - name: Install dependencies
        working-directory: ./
        run: npm install

      - name: Expo Prebuild (Generate iOS folder)
        working-directory: ./
        run: |
          npx expo prebuild -p ios --clean
          
      - name: Fix Bundle React Native script bug
        working-directory: ./ios
        run: |
          sed -i '' 's/NODE_BINARY="node"/NODE_BINARY="$(command -v node)"/g' Pods/Target\ Support\ Files/Pods-HrProApp/Pods-HrProApp-frameworks.sh || true

      - name: Install CocoaPods
        working-directory: ./ios
        run: pod install

      - name: Build App (Unsigned)
        working-directory: ./ios
        run: |
          xcodebuild -workspace HrProApp.xcworkspace \
            -scheme HrProApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Payload to IPA
        working-directory: ./ios
        run: |
          mkdir -p Payload
          # نقل التطبيق المصدر (بصيغة .app) داخل مجلد Payload
          mv build/Build/Products/Release-iphoneos/HrProApp.app Payload/
          # ضغط المجلد بصيغة .ipa
          zip -r app-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HrProApp-Unsigned-IPA
          path: ios/app-unsigned.ipa
